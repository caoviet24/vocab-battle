name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: production
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    runs-on: [self-hosted, linux, x64]
    steps:
      - uses: actions/checkout@v6
      - env:
          NEXT_PUBLIC_API_URL: https://api.urms.io.vn
          NEXT_PUBLIC_WS_URL: wss://api.urms.io.vn
        run: docker compose --env-file "$HOME/.config/vocab-battle/.env.product" up -d --build --remove-orphans
