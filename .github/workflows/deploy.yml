name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: production
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    runs-on: [self-hosted, linux, x64]
    steps:
      - uses: actions/checkout@v6
      - run: docker compose --env-file "$HOME/.config/vocab-battle/.env.product" up -d --build --remove-orphans
