name: vocab-battle

services:
  mongodb:
    image: mongo:6
    container_name: vocab_mongo
    ports:
      - "${BIND_HOST:?Missing BIND_HOST}:${MONGO_HOST_PORT:?Missing MONGO_HOST_PORT}:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vocab_backend
    ports:
      - "${BIND_HOST:-127.0.0.1}:${BACKEND_DOCKER_PORT:-8082}:${BACKEND_PORT:-8080}"
    environment:
      MONGO_URI: "${MONGO_DOCKER_URI:-mongodb://mongodb:27017}"
      Mongo__DatabaseName: "${DB_NAME:?Missing DB_NAME}"
      CardPayloadEncryption__Key: "${ENCRYPTION_KEY:?Missing ENCRYPTION_KEY}"
      ADMIN_OTP: "${ADMIN_OTP:-031024}"
      PORT: "${BACKEND_PORT:-8080}"
    depends_on:
      mongodb:
        condition: service_healthy
    restart: unless-stopped

  client:
    build:
      context: ./client
      dockerfile: dockerfile
      args:
        NEXT_PUBLIC_API_URL: "${NEXT_PUBLIC_API_URL:?Missing NEXT_PUBLIC_API_URL}"
        NEXT_PUBLIC_WS_URL: "${NEXT_PUBLIC_WS_URL:?Missing NEXT_PUBLIC_WS_URL}"
        NEXT_PUBLIC_CARD_PAYLOAD_KEY: "${ENCRYPTION_KEY:?Missing ENCRYPTION_KEY}"
    container_name: vocab_client
    ports:
      - "${BIND_HOST:?Missing BIND_HOST}:${CLIENT_DOCKER_PORT:?Missing CLIENT_DOCKER_PORT}:${CLIENT_INTERNAL_PORT:?Missing CLIENT_INTERNAL_PORT}"
    environment:
      PORT: "${CLIENT_INTERNAL_PORT:?Missing CLIENT_INTERNAL_PORT}"
      R2_ENDPOINT: "${R2_ENDPOINT:?Missing R2_ENDPOINT}"
      R2_BUCKET: "${R2_BUCKET:?Missing R2_BUCKET}"
      R2_ACCESS_KEY_ID: "${R2_ACCESS_KEY_ID:?Missing R2_ACCESS_KEY_ID}"
      R2_SECRET_ACCESS_KEY: "${R2_SECRET_ACCESS_KEY:?Missing R2_SECRET_ACCESS_KEY}"
      R2_PUBLIC_URL: "${R2_PUBLIC_URL:?Missing R2_PUBLIC_URL}"
      R2_UPLOAD_PREFIX: "${R2_UPLOAD_PREFIX-uploads}"
      R2_PRESIGNED_URL_TTL_SECONDS: "${R2_PRESIGNED_URL_TTL_SECONDS:-300}"
    volumes:
      - image_uploads:/app/storage/uploads
    depends_on:
      - backend
    restart: unless-stopped

  client-admin:
    build:
      context: ./admin
      dockerfile: dockerfile
      args:
        NEXT_PUBLIC_API_URL: "${NEXT_PUBLIC_API_URL:?Missing NEXT_PUBLIC_API_URL}"
        NEXT_PUBLIC_WS_URL: "${NEXT_PUBLIC_WS_URL:?Missing NEXT_PUBLIC_WS_URL}"
        NEXT_PUBLIC_CARD_PAYLOAD_KEY: "${ENCRYPTION_KEY:?Missing ENCRYPTION_KEY}"
    container_name: vocab_client_admin
    ports:
      - "${BIND_HOST:?Missing BIND_HOST}:${ADMIN_DOCKER_PORT:?Missing ADMIN_DOCKER_PORT}:${ADMIN_INTERNAL_PORT:?Missing ADMIN_INTERNAL_PORT}"
    environment:
      PORT: "${ADMIN_INTERNAL_PORT:?Missing ADMIN_INTERNAL_PORT}"
      R2_ENDPOINT: "${R2_ENDPOINT:?Missing R2_ENDPOINT}"
      R2_BUCKET: "${R2_BUCKET:?Missing R2_BUCKET}"
      R2_ACCESS_KEY_ID: "${R2_ACCESS_KEY_ID:?Missing R2_ACCESS_KEY_ID}"
      R2_SECRET_ACCESS_KEY: "${R2_SECRET_ACCESS_KEY:?Missing R2_SECRET_ACCESS_KEY}"
      R2_PUBLIC_URL: "${R2_PUBLIC_URL:?Missing R2_PUBLIC_URL}"
      R2_UPLOAD_PREFIX: "${R2_UPLOAD_PREFIX-uploads}"
      R2_PRESIGNED_URL_TTL_SECONDS: "${R2_PRESIGNED_URL_TTL_SECONDS:-300}"
    volumes:
      - image_uploads:/app/storage/uploads
    depends_on:
      - backend
    restart: unless-stopped
    

volumes:
  mongo_data:
  image_uploads:
