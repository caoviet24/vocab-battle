name: vocab-battle

services:
  mongodb:
    image: mongo:6
    container_name: vocab_mongo
    ports:
      - "${BIND_HOST:?Missing BIND_HOST}:${MONGO_HOST_PORT:?Missing MONGO_HOST_PORT}:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: dockerfile
    container_name: vocab_backend
    ports:
      - "${BIND_HOST:?Missing BIND_HOST}:${BACKEND_DOCKER_PORT:?Missing BACKEND_DOCKER_PORT}:${BACKEND_PORT:?Missing BACKEND_PORT}"
    environment:
      MONGO_URI: "${MONGO_DOCKER_URI:?Missing MONGO_DOCKER_URI}"
      DB_NAME: "${DB_NAME:?Missing DB_NAME}"
      PORT: "${BACKEND_PORT:?Missing BACKEND_PORT}"
      GIN_MODE: "${GIN_MODE:?Missing GIN_MODE}"
    depends_on:
      mongodb:
        condition: service_healthy
    restart: unless-stopped

  client:
    build:
      context: ./vocab-battle-client
      dockerfile: dockerfile
      args:
        NEXT_PUBLIC_API_URL: "${NEXT_PUBLIC_API_URL:?Missing NEXT_PUBLIC_API_URL}"
        NEXT_PUBLIC_WS_URL: "${NEXT_PUBLIC_WS_URL:?Missing NEXT_PUBLIC_WS_URL}"
    container_name: vocab_client
    ports:
      - "${BIND_HOST:?Missing BIND_HOST}:${CLIENT_DOCKER_PORT:?Missing CLIENT_DOCKER_PORT}:${CLIENT_INTERNAL_PORT:?Missing CLIENT_INTERNAL_PORT}"
    environment:
      PORT: "${CLIENT_INTERNAL_PORT:?Missing CLIENT_INTERNAL_PORT}"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  mongo_data:
